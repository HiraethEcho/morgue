{{ define "main" }}
  <strong>{{ .Title }}</strong>
  {{- with .Params.summary -}}
    <p>{{- . -}}</p>
  {{- end -}}
  {{- range .Sections }}
    {{- partial "sectiontree.html" (dict "page" .) -}}
  {{- end }}
  <article>
    {{ .Content }}
    <ul>
      {{ range .RegularPages }}
        <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
        {{ .Summary }}
      {{ end }}
    </ul>
  </article>
{{ end }}
