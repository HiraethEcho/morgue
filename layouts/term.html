{{ define "main" }}
  <strong>{{ .Title }}</strong>
  <article>
    {{ .Content }}
    <ul>
      {{ range .RegularPages }}
        <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
        {{- with .Params.summary -}}
          <p>{{- . -}}</p>
        {{- end -}}
      {{ end }}
    </ul>
  </article>
{{ end }}
