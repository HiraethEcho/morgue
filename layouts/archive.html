{{ define "main" }}
  <strong>{{ .Title }}</strong>
  <em>{{ .Summary }}</em>
  <article>
    {{ .Content }}
    <ul>
      {{ range .Site.RegularPages }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a> <em>{{ .Summary }}</em>
        </li>
      {{ end }}
    </ul>
  </article>
{{ end }}
